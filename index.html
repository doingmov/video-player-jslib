<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Видео плеер</title>

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

<style>
    .player-container {
        width: 800px;
        height: 600px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);

        display: flex;
        flex-direction: column;
    }

    .video-container {
        flex-grow: 1;
    }

    .controls {
        background: black;
        flex-shrink: 0;
        display: flex;
        gap: 10px;
    }

    .player-button {
        border: none;
        cursor: pointer;
        background-color: transparent;
        padding: 10px;
    }

    .player-icon {
        color: white;
        font-size: 24px;
    }
</style>
</head>
<body>

<div id="player" class="player-container">
    <div class="js-video-container video-container"></div>

<div class="controls">

    <button class="js-play-button player-button">
        <i class="fas fa-play player-icon"></i>
    </button>

    <button class="js-pause-button player-button" hidden>
        <i class="fas fa-pause player-icon"></i>
    </button>

    <button class="js-volume-button player-button" hidden>
        <i class="fas fa-volume-up player-icon"></i>
    </button>

    <button class="js-mute-button player-button">
        <i class="fas fa-volume-off player-icon"></i>
    </button>

</div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
<script src="player.js"></script>

<script>
    createPlayer({
        elementId: 'player'
    });
</script>

</body>
</html>
