<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Видео плеер</title>

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

</head>
<body>

<div id="player" style="width: 800px; height: 600px;">
    <div class="js-video-container" style="width: 100%; height: 100%"></div>

<div style="background: black;">

    <button class="js-play-button" style="border: none; cursor: pointer; background-color: transparent;">
        <i class="fas fa-play" style="color: white;"></i>
    </button>

    <button class="js-pause-button" style="display: inline-block; border: none; cursor: pointer; background-color: transparent;">
        <i class="fas fa-pause" style="color: white;"></i>
    </button>

</div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
<script src="player.js"></script>

<script>
    createPlayer({
        elementId: 'player'
    });
</script>

</body>
</html>
