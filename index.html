<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Видео плеер</title>

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

<style>
    .player-container {
        width: 800px;
        height: 600px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .video-container {
        width: 100%;
        height: 100%;
    }

    .controls {
        background: black;
    }

    .player-button {
        border: none;
        cursor: pointer;
        background-color: transparent;
    }

    .player-icon {
        color: white;
    }
</style>
</head>
<body>

<div id="player" class="player-container">
    <div class="js-video-container video-container"></div>

<div class="controls">

    <button class="js-play-button player-button">
        <i class="fas fa-play player-icon"></i>
    </button>

    <button class="js-pause-button player-button" hidden>
        <i class="fas fa-pause player-icon"></i>
    </button>

</div>
</div>

<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://unpkg.com/playable@2.10.3/dist/statics/playable.bundle.min.js"></script>
<script src="player.js"></script>

<script>
    createPlayer({
        elementId: 'player'
    });
</script>

</body>
</html>
